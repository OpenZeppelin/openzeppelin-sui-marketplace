name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sui_cli_version:
        description: "Optional Sui CLI version override for manual runs (example: 1.67.1 or sui@testnet)"
        required: false
        default: ""
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22.21.1"
  PNPM_VERSION: "10"
  SUI_CLI_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sui_cli_version != '' && github.event.inputs.sui_cli_version || '1.67.1' }}
  CI: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        suite: [tooling, dapp]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/run-unit-tests
        with:
          suite: ${{ matrix.suite }}
          report: reports/unit-${{ matrix.suite }}.xml
          extra-args: --coverage
      - name: Upload unit test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-${{ matrix.suite }}-artifacts
          path: |
            reports/**
            coverage/**
          if-no-files-found: ignore

  installer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Run installer tests
        run: node --test scripts/ci/install-sui-cli.test.mjs

  ui-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm ui build

  integration:
    needs:
      - lint
      - typecheck
      - unit
      - installer-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tooling
            command: pnpm tooling test:integration
            report: reports/vitest-tooling-integration.xml
          - name: dapp
            command: pnpm dapp test:integration
            report: reports/vitest-dapp-integration.xml
    env:
      SUI_IT_WITH_FAUCET: "1"
      SUI_IT_KEEP_TEMP: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/setup-sui
      - uses: ./.github/actions/run-integration-tests
        with:
          command: ${{ matrix.command }}
          report: ${{ matrix.report }}
      - name: Upload ${{ matrix.name }} integration artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-integration-artifacts
          path: |
            reports/**
            /tmp/sui-it-*/logs/**
          if-no-files-found: ignore

  move-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        package:
          - oracle-market
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/setup-sui
      - name: Run Move tests (${{ matrix.package }})
        run: |
          pnpm script move:test \
            --package-path ${{ matrix.package }} \
            --network localnet \
            --coverage \
            --trace \
            --test \
            --coverage-summary

  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm audit --audit-level=high
